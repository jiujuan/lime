appId: com.limecloud.lime
productName: Lime
copyright: Copyright © Lime

directories:
  output: release-electron

artifactName: ${productName}_${version}_${arch}.${ext}

files:
  - package.json
  - dist/**/*
  - dist-electron/main/**/*
  - dist-electron/preload/**/*

extraResources:
  - from: dist-electron/desktop-assets
    to: desktop-assets
  - from: dist-electron/app-server.release.json
    to: app-server.release.json
  - from: dist-electron/app-server
    to: app-server

asar: true
npmRebuild: false

protocols:
  - name: Lime URL
    schemes:
      - lime

mac:
  category: public.app-category.productivity
  icon: lime-rs/icons/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: lime-rs/entitlements.plist
  entitlementsInherit: lime-rs/entitlements.plist
  extendInfo: lime-rs/Info.plist
  notarize: true
  target:
    - target: dmg
    - target: zip
  publish:
    - provider: generic
      url: ${env.LIME_ELECTRON_UPDATES_URL}

dmg:
  sign: false

win:
  icon: lime-rs/icons/icon.ico
  target:
    - target: nsis
  publish:
    - provider: generic
      url: ${env.LIME_ELECTRON_UPDATES_URL}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
