<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="46%" stop-color="#eefcf7"/>
      <stop offset="100%" stop-color="#fff8ed"/>
    </linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.11"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 850 42px ui-sans-serif, -apple-system, BlinkMacSystemFont, &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, sans-serif; fill:#0f172a; }
      .subtitle { font: 500 21px ui-sans-serif, -apple-system, BlinkMacSystemFont, &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, sans-serif; fill:#475569; }
      .section { font: 800 22px ui-sans-serif, -apple-system, BlinkMacSystemFont, &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, sans-serif; fill:#0f172a; }
      .label { font: 750 19px ui-sans-serif, -apple-system, BlinkMacSystemFont, &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, sans-serif; fill:#0f172a; }
      .small { font: 500 16px ui-sans-serif, -apple-system, BlinkMacSystemFont, &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, sans-serif; fill:#475569; }
      .tiny { font: 600 14px ui-sans-serif, -apple-system, BlinkMacSystemFont, &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, sans-serif; fill:#64748b; }
      .num { font: 900 28px ui-sans-serif, -apple-system, BlinkMacSystemFont, &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, sans-serif; fill:#0f172a; }
      .num-hot { font: 950 32px ui-sans-serif, -apple-system, BlinkMacSystemFont, &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, sans-serif; fill:#be123c; }
      .card { rx:28; fill:#ffffff; stroke:#dbe5ee; stroke-width:1.5; filter:url(#shadow); }
      .mini { rx:20; fill:#ffffff; stroke:#dbe5ee; stroke-width:1.4; }
      .green { fill:#ecfdf5; stroke:#a7f3d0; }
      .blue { fill:#eff6ff; stroke:#bfdbfe; }
      .amber { fill:#fffbeb; stroke:#fde68a; }
      .rose { fill:#fff1f2; stroke:#fecdd3; }
      .slate { fill:#f8fafc; stroke:#dbe5ee; }
      .pill { font: 750 13px ui-sans-serif, -apple-system, BlinkMacSystemFont, &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, sans-serif; }
      .line { stroke:#334155; stroke-width:3; fill:none; marker-end:url(#arrow); }
      .dash { stroke:#94a3b8; stroke-width:2; fill:none; stroke-dasharray:8 8; }
    </style>
  </defs>

  <rect width="1600" height="1100" fill="url(#bg)"/>
  <circle cx="1410" cy="120" r="210" fill="#dbeafe" opacity="0.42"/>
  <circle cx="165" cy="930" r="250" fill="#bbf7d0" opacity="0.28"/>
  <circle cx="1480" cy="945" r="180" fill="#fed7aa" opacity="0.26"/>

  <text x="86" y="82" class="title">Lime 首字 Token 慢点复查图</text>
  <text x="88" y="122" class="subtitle">2026-05-10 真实 GUI 复测：前端首响已经足够快，真正拖慢 TTFT 的是 WebSearch allowed 误入 FullRuntime 后的 MCP / 工具面预热。</text>

  <rect x="86" y="158" width="1428" height="315" class="card"/>
  <text x="122" y="210" class="section">点击发送到首字可见的实测链路</text>

  <rect x="122" y="250" width="230" height="142" class="mini green"/>
  <text x="148" y="286" class="num">50ms</text>
  <text x="148" y="322" class="label">首页 pending</text>
  <text x="148" y="352" class="small">草稿壳和占位态出现</text>
  <text x="148" y="376" class="tiny">assistantDraftPaint 88ms</text>

  <line x1="365" y1="321" x2="435" y2="321" class="line"/>

  <rect x="450" y="250" width="230" height="142" class="mini blue"/>
  <text x="476" y="286" class="num">298ms</text>
  <text x="476" y="322" class="label">运行态到达</text>
  <text x="476" y="352" class="small">firstEvent 297ms</text>
  <text x="476" y="376" class="tiny">submitAccepted 258ms</text>

  <line x1="693" y1="321" x2="763" y2="321" class="line"/>

  <rect x="778" y="236" width="300" height="170" class="mini rose"/>
  <text x="804" y="276" class="num-hot">6372ms</text>
  <text x="804" y="314" class="label">提交准备阻塞</text>
  <text x="804" y="344" class="small">context7 MCP 启动约 3.6s</text>
  <text x="804" y="368" class="small">playwright MCP 启动约 2.5s</text>
  <text x="804" y="392" class="tiny">旧逻辑：allowed search 也触发 FullRuntime</text>

  <line x1="1092" y1="321" x2="1162" y2="321" class="line"/>

  <rect x="1177" y="250" width="250" height="142" class="mini amber"/>
  <text x="1203" y="286" class="num">3553ms</text>
  <text x="1203" y="322" class="label">模型 / policy 首字</text>
  <text x="1203" y="352" class="small">headers 456ms</text>
  <text x="1203" y="376" class="tiny">first provider msg 1139ms</text>

  <line x1="1438" y1="321" x2="1480" y2="321" class="line"/>

  <rect x="1218" y="408" width="250" height="44" rx="22" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="1240" y="436" class="pill" fill="#9a3412">首正文到可见仅 130ms</text>

  <text x="122" y="440" class="tiny">总结果：firstThinkingDelta 9024ms，firstTextDelta 10656ms，firstTextPaint 10786ms。前端 paint 不是主瓶颈。</text>

  <rect x="86" y="510" width="690" height="380" class="card"/>
  <text x="122" y="560" class="section">这次补查到的真实慢点</text>

  <rect x="122" y="592" width="610" height="72" class="mini rose"/>
  <text x="150" y="624" class="label">1. WebSearch allowed 被当成重型执行入口</text>
  <text x="150" y="650" class="small">只是“允许联网”，不等于本轮必须启动完整 MCP 工具面。</text>

  <rect x="122" y="682" width="610" height="72" class="mini rose"/>
  <text x="150" y="714" class="label">2. FullRuntime 无差别预热 enabled_lime MCP</text>
  <text x="150" y="740" class="small">简单短问也会串行启动 context7 / playwright，直接吃掉 6s+。</text>

  <rect x="122" y="772" width="610" height="72" class="mini amber"/>
  <text x="150" y="804" class="label">3. 搜索开启时前端 Prompt 退出紧凑模式</text>
  <text x="150" y="830" class="small">首轮输入体积变大，进一步放大 provider 首 token 等待。</text>

  <rect x="824" y="510" width="690" height="380" class="card"/>
  <text x="860" y="560" class="section">本轮优化后的路由原则</text>

  <rect x="860" y="592" width="610" height="72" class="mini green"/>
  <text x="888" y="624" class="label">Allowed Search：仍走 FastChat</text>
  <text x="888" y="650" class="small">WebSearch / WebFetch 原生工具保留，模型按需搜索，但不启动 MCP。</text>

  <rect x="860" y="682" width="610" height="72" class="mini green"/>
  <text x="888" y="714" class="label">Required Search：只保留搜索约束，不预热 MCP</text>
  <text x="888" y="740" class="small">明确 required 时可等待 WebSearch preflight，但 context7 / playwright 不应前置。</text>

  <rect x="860" y="772" width="610" height="72" class="mini green"/>
  <text x="888" y="804" class="label">Full Context：有真实技能 / 项目 / 浏览器需求才预热</text>
  <text x="888" y="830" class="small">service skill、图片任务、项目上下文、多代理等仍保持重型 runtime。</text>

  <rect x="86" y="925" width="1428" height="110" class="card"/>
  <text x="122" y="970" class="section">慢点排序与预期收益</text>
  <text x="122" y="1002" class="small">优先级 1：MCP / tool surface startup 约 6.37s，本轮通过 search-only 快路径移除；优先级 2：provider / policy 首字约 3.55s，后续继续看模型路由、Prompt 体积和缓存；优先级 3：前端首字 paint 约 0.13s，暂非瓶颈。</text>
  <text x="122" y="1028" class="tiny">数据源：2026-05-10 Lime Playwright 真实复测 + Tauri TTFT 日志。优化提交后需继续用同一句短问复测 submit preparation 与 firstTextDelta。</text>

  <rect x="1145" y="72" width="330" height="52" rx="26" fill="#ecfdf5" stroke="#86efac"/>
  <text x="1174" y="105" class="pill" fill="#166534">已复查：前端快，后端预热慢</text>
</svg>
