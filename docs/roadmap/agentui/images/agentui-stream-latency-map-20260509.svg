<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="45%" stop-color="#effdf7"/>
      <stop offset="100%" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.11"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 850 40px ui-sans-serif, -apple-system, BlinkMacSystemFont, &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, sans-serif; fill:#0f172a; }
      .subtitle { font: 500 19px ui-sans-serif, -apple-system, BlinkMacSystemFont, &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, sans-serif; fill:#475569; }
      .section { font: 800 22px ui-sans-serif, -apple-system, BlinkMacSystemFont, &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, sans-serif; fill:#0f172a; }
      .label { font: 750 18px ui-sans-serif, -apple-system, BlinkMacSystemFont, &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, sans-serif; fill:#0f172a; }
      .small { font: 500 15.5px ui-sans-serif, -apple-system, BlinkMacSystemFont, &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, sans-serif; fill:#475569; }
      .tiny { font: 600 13.5px ui-sans-serif, -apple-system, BlinkMacSystemFont, &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, sans-serif; fill:#64748b; }
      .num { font: 900 27px ui-sans-serif, -apple-system, BlinkMacSystemFont, &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, sans-serif; fill:#0f172a; }
      .num-ok { font: 950 31px ui-sans-serif, -apple-system, BlinkMacSystemFont, &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, sans-serif; fill:#047857; }
      .num-hot { font: 950 31px ui-sans-serif, -apple-system, BlinkMacSystemFont, &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, sans-serif; fill:#be123c; }
      .card { rx:28; fill:#ffffff; stroke:#dbe5ee; stroke-width:1.5; filter:url(#shadow); }
      .mini { rx:20; fill:#ffffff; stroke:#dbe5ee; stroke-width:1.4; }
      .green { fill:#ecfdf5; stroke:#a7f3d0; }
      .blue { fill:#eff6ff; stroke:#bfdbfe; }
      .amber { fill:#fffbeb; stroke:#fde68a; }
      .rose { fill:#fff1f2; stroke:#fecdd3; }
      .slate { fill:#f8fafc; stroke:#dbe5ee; }
      .pill { font: 750 13px ui-sans-serif, -apple-system, BlinkMacSystemFont, &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, sans-serif; }
      .line { stroke:#334155; stroke-width:3; fill:none; marker-end:url(#arrow); }
      .dash { stroke:#94a3b8; stroke-width:2; fill:none; stroke-dasharray:8 8; }
    </style>
  </defs>

  <rect width="1600" height="1120" fill="url(#bg)"/>
  <circle cx="1410" cy="120" r="210" fill="#dbeafe" opacity="0.42"/>
  <circle cx="165" cy="948" r="260" fill="#bbf7d0" opacity="0.28"/>
  <circle cx="1480" cy="965" r="185" fill="#fed7aa" opacity="0.26"/>

  <text x="86" y="78" class="title">Lime AgentUI 流式延迟复测图 v6</text>
  <text x="88" y="118" class="subtitle">2026-05-12 收口：runtime status 百毫秒级；多 provider TTFT 矩阵 gate pass，剩余优化是 fallback 解释。</text>

  <rect x="1148" y="67" width="335" height="52" rx="26" fill="#ecfdf5" stroke="#86efac"/>
  <text x="1178" y="100" class="pill" fill="#166534">已完成：TTFT 落库 + 路由 + GUI 证据 + 样本矩阵</text>

  <rect x="86" y="156" width="1428" height="318" class="card"/>
  <text x="122" y="207" class="section">点击发送到用户可见反馈的实测链路</text>

  <rect x="122" y="247" width="220" height="150" class="mini green"/>
  <text x="148" y="286" class="num-ok">0.09-0.12s</text>
  <text x="148" y="322" class="label">runtime status</text>
  <text x="148" y="352" class="small">Playwright submit / status</text>
  <text x="148" y="377" class="tiny">不是当前主瓶颈</text>

  <line x1="355" y1="322" x2="420" y2="322" class="line"/>

  <rect x="435" y="247" width="248" height="150" class="mini blue"/>
  <text x="461" y="286" class="num-ok">1.53-1.94s</text>
  <text x="461" y="322" class="label">GUI 最新 TTFT</text>
  <text x="461" y="352" class="small">metadata -> read model</text>
  <text x="461" y="377" class="tiny">visible / thinking / text 可复核</text>

  <line x1="696" y1="322" x2="761" y2="322" class="line"/>

  <rect x="776" y="231" width="292" height="184" class="mini amber"/>
  <text x="804" y="273" class="num-ok">p50 2.30s</text>
  <text x="804" y="310" class="label">deepseek 快基线</text>
  <text x="804" y="340" class="small">17 条 first-text 样本</text>
  <text x="804" y="365" class="small">跨 provider 已有可对照矩阵</text>
  <text x="804" y="390" class="tiny">completion gate 已通过</text>

  <line x1="1082" y1="322" x2="1147" y2="322" class="line"/>

  <rect x="1162" y="231" width="300" height="184" class="mini rose"/>
  <text x="1190" y="273" class="num-hot">已分类</text>
  <text x="1190" y="310" class="label">provider / model 波动</text>
  <text x="1190" y="340" class="small">慢候选降权，不可用候选 fallback-only</text>
  <text x="1190" y="365" class="small">不再误判为 UI paint 问题</text>
  <text x="1190" y="390" class="tiny">后续只补脱敏 reason code</text>

  <text x="122" y="444" class="tiny">矩阵：9 个 responsive_chat latency group；6 个 first-text baseline，3 个 fallback-only evidence；totalNeededFirstTextSamples=0。</text>
  <text x="122" y="466" class="tiny">GUI 复核：latestModelDeltaTiming firstText 1.94s，Harness routing evidence 可见，console error=0。</text>

  <rect x="86" y="510" width="690" height="360" class="card"/>
  <text x="122" y="561" class="section">已经收口的 current 事实源</text>

  <rect x="122" y="594" width="610" height="68" class="mini green"/>
  <text x="150" y="624" class="label">TTFT telemetry 进入 agent_runs.metadata</text>
  <text x="150" y="648" class="small">model_first_visible / thinking / text_delta_ms 成为首字事实源。</text>

  <rect x="122" y="680" width="610" height="68" class="mini green"/>
  <text x="150" y="710" class="label">responsive_chat_auto 消费真实历史样本</text>
  <text x="150" y="734" class="small">优先 first text；慢首字 / reasoning / unsupported / recent error 会回退。</text>

  <rect x="122" y="766" width="610" height="68" class="mini green"/>
  <text x="150" y="796" class="label">AgentUI 可靠性面板可见 routing evidence</text>
  <text x="150" y="820" class="small">selected model、TTFT、decisionReason、fallbackChain 可展示和复制。</text>

  <rect x="824" y="510" width="690" height="360" class="card"/>
  <text x="860" y="561" class="section">完成后的治理打法</text>

  <rect x="860" y="594" width="610" height="68" class="mini amber"/>
  <text x="888" y="624" class="label">真实多 provider 样本矩阵已补齐</text>
  <text x="888" y="648" class="small">6 个 first-text baseline；3 个 fallback-only 只作路由证据。</text>

  <rect x="860" y="680" width="610" height="68" class="mini amber"/>
  <text x="888" y="710" class="label">避免慢 service setting 锁死响应模型</text>
  <text x="888" y="734" class="small">慢候选自动降权；fallback-only 候选继续避开。</text>

  <rect x="860" y="766" width="610" height="68" class="mini amber"/>
  <text x="888" y="796" class="label">可靠性面板作为 GUI 回归门</text>
  <text x="888" y="820" class="small">每次路由变化都要看到 selected、TTFT、fallback reason。</text>

  <rect x="86" y="908" width="452" height="122" class="card"/>
  <text x="122" y="954" class="section">当前证据</text>
  <text x="122" y="986" class="small">Matrix gate：pass，need=0。</text>
  <text x="122" y="1012" class="small">GUI：firstText 1.94s，console error=0。</text>

  <rect x="574" y="908" width="452" height="122" class="card"/>
  <text x="610" y="954" class="section">治理口径</text>
  <text x="610" y="986" class="small">current：metadata -> latestModelDeltaTiming。</text>
  <text x="610" y="1012" class="small">compat：fallback-only 仅作降权证据。</text>

  <rect x="1062" y="908" width="452" height="122" class="card"/>
  <text x="1098" y="954" class="section">下一刀（可选）</text>
  <text x="1098" y="986" class="small">补 fallback-only 脱敏 reason code。</text>
  <text x="1098" y="1012" class="small">UI 显示低延迟 / 慢 / fallback-only 三段。</text>

  <rect x="86" y="1050" width="1428" height="42" rx="21" fill="#f8fafc" stroke="#dbe5ee"/>
  <text x="122" y="1068" class="tiny">更新口径：UI / runtime status 百毫秒级已经成立；answer 首字由 provider/model TTFT 决定。</text>
  <text x="122" y="1087" class="tiny">完整目标已完成；后续只做解释性体验与脱敏 reason code 增强。</text>
</svg>
