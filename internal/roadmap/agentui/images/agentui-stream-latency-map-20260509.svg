<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="45%" stop-color="#effdf7"/>
      <stop offset="100%" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.11"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 850 40px ui-sans-serif, -apple-system, BlinkMacSystemFont, &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, sans-serif; fill:#0f172a; }
      .subtitle { font: 500 19px ui-sans-serif, -apple-system, BlinkMacSystemFont, &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, sans-serif; fill:#475569; }
      .section { font: 800 22px ui-sans-serif, -apple-system, BlinkMacSystemFont, &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, sans-serif; fill:#0f172a; }
      .label { font: 750 18px ui-sans-serif, -apple-system, BlinkMacSystemFont, &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, sans-serif; fill:#0f172a; }
      .small { font: 500 15.5px ui-sans-serif, -apple-system, BlinkMacSystemFont, &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, sans-serif; fill:#475569; }
      .tiny { font: 600 13.5px ui-sans-serif, -apple-system, BlinkMacSystemFont, &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, sans-serif; fill:#64748b; }
      .num { font: 900 27px ui-sans-serif, -apple-system, BlinkMacSystemFont, &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, sans-serif; fill:#0f172a; }
      .num-ok { font: 950 31px ui-sans-serif, -apple-system, BlinkMacSystemFont, &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, sans-serif; fill:#047857; }
      .num-hot { font: 950 31px ui-sans-serif, -apple-system, BlinkMacSystemFont, &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, sans-serif; fill:#be123c; }
      .card { rx:28; fill:#ffffff; stroke:#dbe5ee; stroke-width:1.5; filter:url(#shadow); }
      .mini { rx:20; fill:#ffffff; stroke:#dbe5ee; stroke-width:1.4; }
      .green { fill:#ecfdf5; stroke:#a7f3d0; }
      .blue { fill:#eff6ff; stroke:#bfdbfe; }
      .amber { fill:#fffbeb; stroke:#fde68a; }
      .rose { fill:#fff1f2; stroke:#fecdd3; }
      .slate { fill:#f8fafc; stroke:#dbe5ee; }
      .pill { font: 750 13px ui-sans-serif, -apple-system, BlinkMacSystemFont, &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, sans-serif; }
      .line { stroke:#334155; stroke-width:3; fill:none; marker-end:url(#arrow); }
      .dash { stroke:#94a3b8; stroke-width:2; fill:none; stroke-dasharray:8 8; }
    </style>
  </defs>

  <rect width="1600" height="1120" fill="url(#bg)"/>
  <circle cx="1410" cy="120" r="210" fill="#dbeafe" opacity="0.42"/>
  <circle cx="165" cy="948" r="260" fill="#bbf7d0" opacity="0.28"/>
  <circle cx="1480" cy="965" r="185" fill="#fed7aa" opacity="0.26"/>

  <text x="86" y="78" class="title">Lime AgentUI 流式延迟分段图 v35</text>
  <text x="88" y="118" class="subtitle">2026-06-27 Trace S6：Developer 开关、level/sample_rate、summary 复制/清理与 support bundle 已接入。</text>

  <rect x="1148" y="67" width="335" height="52" rx="26" fill="#ecfdf5" stroke="#86efac"/>
  <text x="1178" y="100" class="pill" fill="#166534">已完成：Developer Trace 控制接入</text>

  <rect x="86" y="156" width="1428" height="318" class="card"/>
  <text x="122" y="207" class="section">首字延迟归因边界：Provider/API 等待 ≠ Lime 本地输出慢</text>

  <rect x="122" y="247" width="220" height="150" class="mini green"/>
  <text x="148" y="286" class="num-ok">Trace ID</text>
  <text x="148" y="322" class="label">Renderer submit</text>
  <text x="148" y="352" class="small">traceId / runId / requestId</text>
  <text x="148" y="377" class="tiny">默认关闭高粒度采集</text>

  <line x1="355" y1="322" x2="420" y2="322" class="line"/>

  <rect x="435" y="247" width="248" height="150" class="mini blue"/>
  <text x="461" y="286" class="num-ok">Turn</text>
  <text x="461" y="322" class="label">App Server received</text>
  <text x="461" y="352" class="small">request received / event envelope</text>
  <text x="461" y="377" class="tiny">S3 已写入精确 checkpoint</text>

  <line x1="696" y1="322" x2="761" y2="322" class="line"/>

  <rect x="776" y="231" width="292" height="184" class="mini rose"/>
  <text x="804" y="273" class="num-ok">无正则</text>
  <text x="804" y="310" class="label">Provider/API wait</text>
  <text x="804" y="340" class="small">provider.request.started → first_text_delta</text>
  <text x="804" y="365" class="small">服务端 / provider 优化域</text>
  <text x="804" y="390" class="tiny">客户端只能显示 provider_wait_ms</text>

  <line x1="1082" y1="322" x2="1147" y2="322" class="line"/>

  <rect x="1162" y="231" width="300" height="184" class="mini green"/>
  <text x="1190" y="273" class="num-ok">本地段</text>
  <text x="1190" y="310" class="label">Lime local output</text>
  <text x="1190" y="340" class="small">server emit → renderer receive</text>
  <text x="1190" y="365" class="small">receive → text apply → flush → paint</text>
  <text x="1190" y="390" class="tiny">客户端优化只看这些 span</text>

  <text x="122" y="444" class="tiny">归因口径：≈59.7s Live provider TTFT 属于 provider/API wait，不再计入 Lime renderer 或客户端本地输出耗时。</text>
  <text x="122" y="466" class="tiny">客户端 Trace 先记录 server_event_emitted_at、renderer_event_received_at、firstTextDelta、firstTextRenderFlush、firstTextPaint。</text>

  <rect x="86" y="510" width="690" height="360" class="card"/>
  <text x="122" y="561" class="section">Renderer Trace 骨架</text>

  <rect x="122" y="594" width="610" height="68" class="mini green"/>
  <text x="150" y="624" class="label">独立 Developer Trace 控制</text>
  <text x="150" y="648" class="small">claw_trace 支持 enabled / level / sample_rate，不复用 Harness。</text>

  <rect x="122" y="680" width="610" height="68" class="mini green"/>
  <text x="150" y="710" class="label">统一 envelope 与 trace metadata</text>
  <text x="150" y="734" class="small">traceId / runId / event_id / sequence / server_emit / renderer_receive。</text>

  <rect x="122" y="766" width="610" height="68" class="mini green"/>
  <text x="150" y="796" class="label">复制 / 清空内存 summary</text>
  <text x="150" y="820" class="small">Developer 面板可复制裁剪摘要，并只清 Agent UI perf 内存。</text>

  <rect x="824" y="510" width="690" height="360" class="card"/>
  <text x="860" y="561" class="section">分段指标定义</text>

  <rect x="860" y="594" width="610" height="68" class="mini amber"/>
  <text x="888" y="624" class="label">providerWaitMs</text>
  <text x="888" y="648" class="small">provider.first_text_delta.received.elapsed_ms，归服务端/API。</text>

  <rect x="860" y="680" width="610" height="68" class="mini amber"/>
  <text x="888" y="710" class="label">bridge_delivery_ms</text>
  <text x="888" y="734" class="small">server_event_emitted_at → renderer_event_received_at。</text>

  <rect x="860" y="766" width="610" height="68" class="mini amber"/>
  <text x="888" y="796" class="label">clientLocalOutputMs</text>
  <text x="888" y="820" class="small">server_event_emitted_at → renderer first text paint。</text>


  <rect x="86" y="908" width="452" height="122" class="card"/>
  <text x="122" y="954" class="section">当前证据</text>
  <text x="122" y="986" class="small">S1-S6：Trace 控制、provider projector、diagnostic summary 已接入。</text>
  <text x="122" y="1012" class="small">定向测试：Developer settings / crash diagnostic / metrics 43 例通过。</text>

  <rect x="574" y="908" width="452" height="122" class="card"/>
  <text x="610" y="954" class="section">治理口径</text>
  <text x="610" y="986" class="small">参考 Codex：turn timing state + append-only raw trace envelope。</text>
  <text x="610" y="1012" class="small">不靠正文 hard code，不把 Harness 作为采集事实源。</text>

  <rect x="1062" y="908" width="452" height="122" class="card"/>
  <text x="1098" y="954" class="section">下一缺口</text>
  <text x="1098" y="986" class="small">S6：持久化 trace history、raw trace 导出、保留策略。</text>
  <text x="1098" y="1012" class="small">S7：fixture evidence 导出 providerWait / clientLocal summary。</text>

  <rect x="86" y="1050" width="1428" height="42" rx="21" fill="#f8fafc" stroke="#dbe5ee"/>
  <text x="122" y="1068" class="tiny">更新口径：首字高不能只看总耗时；必须先看 provider_wait_ms 是否占主导，再看 Lime local output 的 bridge / apply / flush / paint。</text>
  <text x="122" y="1087" class="tiny">完成判定：客户端本地优化只针对 App Server 已发出 delta 之后的 span；provider/API 慢由服务端 provider.* trace 继续优化。</text>
</svg>
