install:
  modes:
    - in_lime
  preferredMode: in_lime
  appCenter:
    publishSurface: lime-app-center
    readiness:
      requireWorkbenchProfile: true
      requireAppServerBridge: true
      rejectIframeOnlyRuntime: true
      rejectTauriCommands: true
  runtime:
    minVersion: 0.11.0
    bridge: app-server-json-rpc

