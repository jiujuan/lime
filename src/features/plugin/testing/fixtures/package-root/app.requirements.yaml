requirements:
  mvp:
    - id: content-article
      title: 从自然语言需求生成文章草稿
      acceptance:
        - createsObjectKind: articleDraft
        - opensRightSurfaceTab: articleWorkspace
    - id: content-images
      title: 从文章段落生成图片组
      acceptance:
        - createsObjectKind: imageGenerationSet
        - renderer: imageGrid
    - id: content-storyboard
      title: 从文章或简报生成视频分镜
      acceptance:
        - createsObjectKind: videoStoryboard
        - renderer: storyboard
    - id: content-history-restore
      title: 打开历史任务恢复主产物
      acceptance:
        - restoresSelectedObject: true
        - restoresOpenTabKinds:
            - articleWorkspace
  nonGoals:
    - 完整素材库后台
    - 云端团队协作
    - 发布平台账号绑定
    - 真实视频模型网关
    - 复用旧 Content Studio 程序
