boundaries:
  appOwns:
    - production object declarations
    - workbench task declarations
    - surface action intent declarations
    - product workspace patch schema
  limeHostOwns:
    - Claw conversation
    - Agent runtime execution
    - App Server JSON-RPC transport
    - Artifact and evidence storage
    - Right Surface host builtin renderers
    - secrets and provider credentials
  forbidden:
    - old Tauri commands
    - iframe-only app workspace
    - BrowserView
    - webview tag
    - direct provider keys
    - direct filesystem writes from surface actions

