agentRuntime:
  bridge:
    kind: app-server-json-rpc
    required: true
  activationEntries:
    - key: content_article_generate
      title: 写文章
      aliases:
        - "@写文章"
        - "@写作"
      kind: plugin
      intent: at_command
      taskKind: content.article.generate
      workflow: content_article_workflow
      defaultObjectKind: articleDraft
      rightSurface: articleWorkspace
    - key: content_factory_generate
      title: 内容工厂
      aliases:
        - "@内容工厂"
      kind: plugin
      intent: at_command
      taskKind: content.factory.generate
      workflow: content_article_workflow
      defaultObjectKind: articleDraft
      rightSurface: articleWorkspace
  worker:
    entrypoint: ./src/runtime/content-factory-worker.mjs
    sampleRequest: ./examples/runtime-request.sample.json
    outputArtifactKind: content_factory.workspace_patch
    directProviderAccess: false
    directFilesystemAccess: false
    hostManagedGeneration:
      enabled: true
      systemPrompt: |
        内容工厂 worker 只接收宿主托管生成结果，不接触 provider key。请生成可直接进入 Article Workspace 的中文 Markdown 正文，避免输出过程说明、JSON、代码围栏或工作流步骤。正式正文使用本生成 brief 的文章 voice；不要直接套用产品聊天口吻。
      requests:
        - id: article-draft-document
          kind: markdown_document
          targetObjectKind: articleDraft
          outputField: documentText
          instructions: |
            根据用户原始请求生成一篇结构完整、段落自然、可继续编辑的中文文章。正文必须包含标题、导语和多个二级小节；不要写“右侧编辑器”“内容工厂”“待执行检索”“编排步骤”等内部实现词。
  workflows:
    - key: content_article_workflow
      title: 写文章工作流
      taskKind: content.article.generate
      triggerIntents:
        - content_article_generate
      outputArtifactKind: content_factory.workspace_patch
      cliRefs:
        - content-factory
      connectorRefs:
        - lime-knowledge
        - web-research
        - media-generation
      hookPolicy:
        prompt:
          - prompt-submit
        task:
          - task-complete
      steps:
        - id: research
          title: 资料检索
          subagent: content-researcher
          skillRefs:
            - article-research
          expectedOutput: 写作依据和素材摘要
        - id: strategy
          title: 选题策划
          subagent: content-strategist
          skillRefs:
            - article-strategy
          expectedOutput: 文章角度、结构和标题方向
        - id: draft
          title: 正文写作
          subagent: article-writer
          skillRefs:
            - article-writing
          expectedOutput: articleDraft
        - id: review
          title: 审稿校对
          subagent: copy-editor
          skillRefs:
            - article-editing
          expectedOutput: deliveryChecklist
        - id: image-plan
          title: 配图规划
          subagent: image-planner
          skillRefs:
            - article-image-plan
          expectedOutput: imageGenerationSet
  cli:
    entrypoint: ./cli/content-factory.mjs
    registry: ./clis/clis.json
    commands:
      - inspect
      - run
      - validate
  connectors:
    registry: ./connectors/connectors.json
  hooks:
    directory: ./hooks
    handlers:
      - key: prompt-submit
        event: prompt.submit
        entrypoint: ./hooks/prompt-submit.mjs
      - key: task-complete
        event: task.complete
        entrypoint: ./hooks/task-complete.mjs
  tasks:
    - kind: content.factory.generate
      input:
        accepts:
          - prompt
          - contentBrief
          - references
      output:
        structuredSchema: ./artifacts/content-factory-workspace-patch.schema.json
        artifactKinds:
          - content_factory.workspace_patch
    - kind: content.article.generate
      input:
        accepts:
          - prompt
          - contentBrief
          - artifactRefs
      output:
        structuredSchema: ./artifacts/content-factory-workspace-patch.schema.json
        artifactKinds:
          - markdown_document
          - content_factory.workspace_patch
    - kind: content.image.generate
      input:
        accepts:
          - articleDraft
          - imagePrompt
          - style
      output:
        structuredSchema: ./artifacts/content-factory-workspace-patch.schema.json
        artifactKinds:
          - image_set
          - content_factory.workspace_patch
      connectorRefs:
        - media-generation
    - kind: content.video.script.generate
      input:
        accepts:
          - contentBrief
          - articleDraft
      output:
        structuredSchema: ./artifacts/content-factory-workspace-patch.schema.json
        artifactKinds:
          - video_script
          - content_factory.workspace_patch
    - kind: content.video.storyboard.generate
      input:
        accepts:
          - contentBrief
          - articleDraft
          - videoScript
      output:
        structuredSchema: ./artifacts/content-factory-workspace-patch.schema.json
        artifactKinds:
          - storyboard
          - content_factory.workspace_patch
      connectorRefs:
        - media-generation
    - kind: content.delivery.review
      input:
        accepts:
          - articleDraft
          - imageGenerationSet
          - videoStoryboard
      output:
        structuredSchema: ./artifacts/content-factory-workspace-patch.schema.json
        artifactKinds:
          - delivery_checklist
          - content_factory.workspace_patch
  session:
    modes:
      - new
      - resume
      - continue
      - fork
    historyRestore:
      articleWorkspace: required
      fallback: artifactPreview
