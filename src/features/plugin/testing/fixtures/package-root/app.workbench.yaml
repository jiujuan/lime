workbench:
  profile: production
  articleWorkspace:
    scope: session
    primaryObjectKinds:
      - articleDraft
      - imageGenerationSet
      - videoStoryboard
    snapshotPolicy:
      onArtifactCreated: true
      onUserSelectionChanged: true
      onSessionClosed: true
  productionObjects:
    - kind: contentBrief
      title: 内容简报
      artifactKind: content_brief
      defaultSurface: briefForm
      versioning: revision
    - kind: articleDraft
      title: 文章草稿
      artifactKind: markdown_document
      defaultSurface: documentCanvas
      versioning: revision
      primary: true
    - kind: imageGenerationSet
      title: 图片生成组
      artifactKind: image_set
      defaultSurface: imageGrid
      versioning: snapshot
    - kind: videoScript
      title: 视频脚本
      artifactKind: video_script
      defaultSurface: documentCanvas
      versioning: revision
    - kind: videoStoryboard
      title: 视频分镜
      artifactKind: storyboard
      defaultSurface: storyboard
      versioning: revision
    - kind: deliveryChecklist
      title: 交付检查清单
      artifactKind: delivery_checklist
      defaultSurface: checklist
      versioning: snapshot
  workbenchTasks:
    - kind: content.article.generate
      title: 生成文章草稿
      workflow: content_article_workflow
      subagents:
        - content-researcher
        - content-strategist
        - article-writer
        - copy-editor
        - image-planner
      skillRefs:
        - article-research
        - article-strategy
        - article-writing
        - article-editing
        - article-image-plan
      expectedObjects:
        - articleDraft
      requiredCapabilities:
        - lime.agent
        - lime.knowledge
        - lime.artifacts
      defaultSurface: documentCanvas
    - kind: content.image.generate
      title: 生成配图
      expectedObjects:
        - imageGenerationSet
      requiredCapabilities:
        - lime.agent
        - lime.media
        - lime.artifacts
      defaultSurface: imageGrid
    - kind: content.video.script.generate
      title: 生成视频脚本
      expectedObjects:
        - videoScript
      requiredCapabilities:
        - lime.agent
        - lime.artifacts
      defaultSurface: documentCanvas
    - kind: content.video.storyboard.generate
      title: 生成视频分镜
      expectedObjects:
        - videoStoryboard
      requiredCapabilities:
        - lime.agent
        - lime.media
        - lime.artifacts
      defaultSurface: storyboard
    - kind: content.delivery.review
      title: 检查交付内容
      expectedObjects:
        - deliveryChecklist
      requiredCapabilities:
        - lime.agent
        - lime.evidence
      defaultSurface: checklist
      humanReview: true
  objectSurfaces:
    - objectKind: contentBrief
      surfaceKind: briefForm
      title: 内容简报
      renderer: host_builtin
      layout: form
      actions:
        - key: start_article
          title: 生成文章
          intent: custom
          startsTaskKind: content.article.generate
          risk: write
    - objectKind: articleDraft
      surfaceKind: documentCanvas
      title: 文章草稿
      renderer: host_builtin
      layout: document
      actions:
        - key: revise
          title: 改写选区
          intent: revise
          startsTaskKind: content.article.generate
          risk: write
        - key: continue_writing
          title: 继续写作
          intent: custom
          startsTaskKind: content.article.generate
          risk: write
        - key: generate_images
          title: 生成配图
          intent: custom
          startsTaskKind: content.image.generate
          risk: write
        - key: export_markdown
          title: 导出 Markdown
          intent: export
          risk: read
    - objectKind: imageGenerationSet
      surfaceKind: imageGrid
      title: 图片生成组
      renderer: host_builtin
      layout: grid
      actions:
        - key: regenerate
          title: 重新生成
          intent: regenerate
          startsTaskKind: content.image.generate
          risk: write
        - key: create_variant
          title: 生成变体
          intent: create_variant
          startsTaskKind: content.image.generate
          risk: write
        - key: apply_to_article
          title: 应用到文章
          intent: custom
          startsTaskKind: content.article.generate
          risk: write
    - objectKind: videoScript
      surfaceKind: documentCanvas
      title: 视频脚本
      renderer: host_builtin
      layout: document
      actions:
        - key: continue_script
          title: 继续脚本
          intent: custom
          startsTaskKind: content.video.script.generate
          risk: write
        - key: create_storyboard
          title: 生成分镜
          intent: custom
          startsTaskKind: content.video.storyboard.generate
          risk: write
    - objectKind: videoStoryboard
      surfaceKind: storyboard
      title: 视频分镜
      renderer: host_builtin
      layout: storyboard
      actions:
        - key: rewrite_shot
          title: 改写镜头
          intent: revise
          startsTaskKind: content.video.storyboard.generate
          risk: write
        - key: export_storyboard
          title: 导出分镜
          intent: export
          risk: read
    - objectKind: deliveryChecklist
      surfaceKind: checklist
      title: 交付检查清单
      renderer: host_builtin
      layout: checklist
      actions:
        - key: approve
          title: 确认交付
          intent: approve
          respondsToAction: true
          risk: write
        - key: request_revision
          title: 要求修改
          intent: revise
          startsTaskKind: content.delivery.review
          risk: write
  artifactMaterializers:
    - key: content.article.materializer
      taskKind: content.article.generate
      acceptedArtifactKinds:
        - markdown_document
        - content_factory.workspace_patch
      outputObjectKind: articleDraft
      writeBack:
        articleWorkspace: true
        artifact: true
        evidence: true
    - key: content.image.materializer
      taskKind: content.image.generate
      acceptedArtifactKinds:
        - image_set
        - content_factory.workspace_patch
      outputObjectKind: imageGenerationSet
      writeBack:
        articleWorkspace: true
        artifact: true
        evidence: true
    - key: content.storyboard.materializer
      taskKind: content.video.storyboard.generate
      acceptedArtifactKinds:
        - storyboard
        - content_factory.workspace_patch
      outputObjectKind: videoStoryboard
      writeBack:
        articleWorkspace: true
        artifact: true
        evidence: true
  historyRestore:
    defaultSurface: selectedObject
    restoreSelection: true
    restoreLayout: true
    fallback: artifactPreview
