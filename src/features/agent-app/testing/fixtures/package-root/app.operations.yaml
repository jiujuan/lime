operations:
  - key: article.revise
    source: articleWorkspace
    mapsToTaskKind: content.article.generate
    risk: write
    evidenceRequired: true
    directProviderAccess: false
  - key: image.generate
    source: articleWorkspace
    mapsToTaskKind: content.image.generate
    risk: write
    evidenceRequired: true
    directProviderAccess: false
  - key: storyboard.rewrite
    source: articleWorkspace
    mapsToTaskKind: content.video.storyboard.generate
    risk: write
    evidenceRequired: true
    directProviderAccess: false
  - key: delivery.approve
    source: articleWorkspace
    respondsToAction: true
    risk: write
    humanConfirmationRequired: true
    evidenceRequired: true
guards:
  allSurfaceActionsMustRouteThroughClaw: true
  forbidDirectFilesystemAccess: true
  forbidDirectSecretAccess: true
  forbidDirectProviderAccess: true
