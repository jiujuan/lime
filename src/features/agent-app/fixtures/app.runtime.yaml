schemaVersion: content-factory.worker-runtime.v1
appId: content-factory-app
worker:
  entrypoint: ./src/runtime/content-factory-worker.mjs
  requestSchema: content-factory.worker-request.v1
  responseSchema: content-factory.worker-response.v1
  execution: host_managed
  directProviderAccess: false
  directFilesystemAccess: false
  outputArtifactKind: content_factory.workspace_patch
tasks:
  - kind: content.factory.generate
  - kind: content.article.generate
  - kind: content.image.generate
  - kind: content.video.script.generate
  - kind: content.video.storyboard.generate
  - kind: content.delivery.review
outputs:
  artifactKind: content_factory.workspace_patch
  productWorkspace:
    schemaVersion: product-workspace.v1
    objectKinds:
      - contentBrief
      - articleDraft
      - imageGenerationSet
      - videoScript
      - videoStoryboard
      - deliveryChecklist
    requiredObjectKinds:
      - articleDraft
      - imageGenerationSet
      - videoStoryboard
      - deliveryChecklist
security:
  providerAccess: host_managed
  filesystemAccess: none
  networkAccess: host_managed
evidence:
  source: artifact.snapshot
  workspacePatchField: contentFactoryWorkspacePatch
followUps:
  - connect host-managed executor
  - persist artifact snapshot into the session read model
  - classify worker timeout and failure states
