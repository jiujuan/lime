site: zhihu
name: hot
description: 知乎热榜
domain: www.zhihu.com

args:
  limit:
    type: int
    default: 20
    description: Number of items to return

pipeline:
  - navigate: https://www.zhihu.com

  - evaluate: |
      (async () => {
        const res = await fetch('https://www.zhihu.com/api/v3/feed/topstory/hot-lists/total?limit=50', {
          credentials: 'include'
        });
        const text = await res.text();
        const d = JSON.parse(
          text.replace(/("id"\s*:\s*)(\d{16,})/g, '$1"$2"')
        );
        return (d?.data || []).map((item) => {
          const t = item.target || {};
          const questionId = t.id == null ? '' : String(t.id);
          return {
            title: t.title,
            url: 'https://www.zhihu.com/question/' + questionId,
            answer_count: t.answer_count,
            follower_count: t.follower_count,
            heat: item.detail_text || '',
          };
        });
      })()

  - map:
      rank: ${{ index + 1 }}
      title: ${{ item.title }}
      heat: ${{ item.heat }}
      answers: ${{ item.answer_count }}
      url: ${{ item.url }}

  - limit: ${{ args.limit }}

columns: [rank, title, heat, answers]
---
site: zhihu
name: search
description: 知乎搜索
domain: www.zhihu.com

args:
  query:
    positional: true
    type: str
    required: true
    description: Search query
  limit:
    type: int
    default: 10
    description: Number of results

pipeline:
  - navigate: https://www.zhihu.com

  - evaluate: |
      (async () => {
        const strip = (html) => (html || '').replace(/<[^>]+>/g, '').replace(/&nbsp;/g, ' ').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&').replace(/<em>/g, '').replace(/<\/em>/g, '').trim();
        const keyword = ${{ args.query | json }};
        const limit = ${{ args.limit }};
        const res = await fetch('https://www.zhihu.com/api/v4/search_v3?q=' + encodeURIComponent(keyword) + '&t=general&offset=0&limit=' + limit, {
          credentials: 'include'
        });
        const d = await res.json();
        return (d?.data || [])
          .filter(item => item.type === 'search_result')
          .map(item => {
            const obj = item.object || {};
            const q = obj.question || {};
            return {
              type: obj.type,
              title: strip(obj.title || q.name || ''),
              excerpt: strip(obj.excerpt || '').substring(0, 100),
              author: obj.author?.name || '',
              votes: obj.voteup_count || 0,
              url: obj.type === 'answer'
                ? 'https://www.zhihu.com/question/' + q.id + '/answer/' + obj.id
                : obj.type === 'article'
                ? 'https://zhuanlan.zhihu.com/p/' + obj.id
                : 'https://www.zhihu.com/question/' + obj.id,
            };
          });
      })()

  - map:
      rank: ${{ index + 1 }}
      title: ${{ item.title }}
      type: ${{ item.type }}
      author: ${{ item.author }}
      votes: ${{ item.votes }}

  - limit: ${{ args.limit }}

columns: [rank, title, type, author, votes]
---
site: linux-do
name: hot
description: linux.do 热门话题
domain: linux.do
browser: true

args:
  limit:
    type: int
    default: 20
    description: Number of topics
  period:
    type: str
    default: weekly
    description: Time period
    choices: [all, daily, weekly, monthly, yearly]

pipeline:
  - navigate: https://linux.do

  - evaluate: |
      (async () => {
        const period = ${{ args.period | json }};
        const res = await fetch('/top.json?period=' + encodeURIComponent(period), { credentials: 'include' });
        if (!res.ok) throw new Error('HTTP ' + res.status + ' - 请先登录 linux.do');
        let data;
        try { data = await res.json(); } catch { throw new Error('响应不是有效 JSON - 请先登录 linux.do'); }
        const topics = data?.topic_list?.topics || [];
        const cats = data?.topic_list?.categories || data?.categories || [];
        const catMap = Object.fromEntries(cats.map(c => [c.id, c.name]));
        return topics.slice(0, ${{ args.limit }}).map(t => ({
          title: t.title,
          replies: (t.posts_count || 1) - 1,
          views: t.views,
          likes: t.like_count,
          category: catMap[t.category_id] || String(t.category_id),
        }));
      })()

  - map:
      rank: ${{ index + 1 }}
      title: ${{ item.title }}
      replies: ${{ item.replies }}
      views: ${{ item.views }}
      likes: ${{ item.likes }}
      category: ${{ item.category }}

  - limit: ${{ args.limit }}

columns: [rank, title, replies, views, likes, category]
---
site: yahoo-finance
name: quote
description: "Yahoo Finance 股票行情"
domain: finance.yahoo.com
strategy: cookie
browser: true

args:
  symbol:
    positional: true
    type: string
    required: true
    description: "Stock ticker (e.g. AAPL, MSFT, TSLA)"

columns: [symbol, name, price, change, changePercent, open, high, low, volume, marketCap]

pipeline:
  - navigate: https://finance.yahoo.com/quote/${{ args.symbol | urlencode }}/
  - evaluate: |
      (async () => {
        const sym = ${{ args.symbol | json }}.toUpperCase().trim();

        try {
          const chartUrl = 'https://query1.finance.yahoo.com/v8/finance/chart/' + encodeURIComponent(sym) + '?interval=1d&range=1d';
          const resp = await fetch(chartUrl);
          if (resp.ok) {
            const d = await resp.json();
            const chart = d?.chart?.result?.[0];
            if (chart) {
              const meta = chart.meta || {};
              const prevClose = meta.previousClose || meta.chartPreviousClose;
              const price = meta.regularMarketPrice;
              const change = price != null && prevClose != null ? (price - prevClose) : null;
              const changePct = change != null && prevClose ? ((change / prevClose) * 100) : null;
              return [{
                symbol: meta.symbol || sym,
                name: meta.shortName || meta.longName || sym,
                price: price != null ? Number(price.toFixed(2)) : null,
                change: change != null ? change.toFixed(2) : null,
                changePercent: changePct != null ? changePct.toFixed(2) + '%' : null,
                open: chart.indicators?.quote?.[0]?.open?.[0] || null,
                high: meta.regularMarketDayHigh || null,
                low: meta.regularMarketDayLow || null,
                volume: meta.regularMarketVolume || null,
                marketCap: null,
              }];
            }
          }
        } catch(e) {}

        const priceEl = document.querySelector('[data-testid="qsp-price"]');
        const changeEl = document.querySelector('[data-testid="qsp-price-change"]');
        const changePctEl = document.querySelector('[data-testid="qsp-price-change-percent"]');
        const titleEl = document.querySelector('title');
        if (priceEl) {
          return [{
            symbol: sym,
            name: titleEl ? titleEl.textContent.split('(')[0].trim() : sym,
            price: priceEl.textContent.replace(/,/g, ''),
            change: changeEl ? changeEl.textContent : null,
            changePercent: changePctEl ? changePctEl.textContent : null,
            open: null, high: null, low: null, volume: null, marketCap: null,
          }];
        }
        return [];
      })()
  - map:
      symbol: ${{ item.symbol }}
      name: ${{ item.name }}
      price: ${{ item.price }}
      change: ${{ item.change }}
      changePercent: ${{ item.changePercent }}
      open: ${{ item.open }}
      high: ${{ item.high }}
      low: ${{ item.low }}
      volume: ${{ item.volume }}
      marketCap: ${{ item.marketCap }}
---
site: smzdm
name: search
description: "什么值得买搜索好价"
domain: www.smzdm.com
strategy: cookie
browser: true

args:
  query:
    positional: true
    type: string
    required: true
    description: Search keyword
  limit:
    type: int
    default: 20
    description: Number of results

columns: [rank, title, price, mall, comments, url]

pipeline:
  - navigate: https://search.smzdm.com/?c=home&s=${{ args.query | urlencode }}&v=b
  - evaluate: |
      (() => {
        const limit = ${{ args.limit }};
        const items = document.querySelectorAll('li.feed-row-wide');
        const results = [];
        items.forEach((li) => {
          if (results.length >= limit) return;
          const titleEl = li.querySelector('h5.feed-block-title > a') || li.querySelector('h5 > a');
          if (!titleEl) return;
          const title = (titleEl.getAttribute('title') || titleEl.textContent || '').trim();
          const url = titleEl.getAttribute('href') || titleEl.href || '';
          const priceEl = li.querySelector('.z-highlight');
          const price = priceEl ? priceEl.textContent.trim() : '';
          let mall = '';
          const mallEl = li.querySelector('.z-feed-foot-r .feed-block-extras span')
                      || li.querySelector('.z-feed-foot-r span');
          if (mallEl) mall = mallEl.textContent.trim();
          const commentEl = li.querySelector('.feed-btn-comment');
          const comments = commentEl ? parseInt(commentEl.textContent.trim()) || 0 : 0;
          results.push({ rank: results.length + 1, title, price, mall, comments, url });
        });
        return results;
      })()
  - map:
      rank: ${{ item.rank }}
      title: ${{ item.title }}
      price: ${{ item.price }}
      mall: ${{ item.mall }}
      comments: ${{ item.comments }}
      url: ${{ item.url }}
