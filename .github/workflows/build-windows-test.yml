name: Build Windows Test Package

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "要构建的分支 / tag / commit SHA"
        required: false
        default: "main"
      retention_days:
        description: "Artifact 保留天数"
        required: false
        default: "7"
      n_minus_one_tag:
        description: "可选 N-1 release tag；留空时自动选择低于候选的最新稳定 tag"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: build-windows-test-${{ github.event.inputs.source_ref || github.ref }}
  cancel-in-progress: true

env:
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  CARGO_TERM_COLOR: always
  NODE_OPTIONS: --max-old-space-size=8192
  ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
  LIME_ELECTRON_UPDATES_URL: https://updates.limecloud.com/lime/stable/win32-x64/

jobs:
  build-windows-test:
    name: Build Electron Windows x64 Squirrel installer
    runs-on: windows-2022
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.source_ref || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: lime-rs
          shared-key: windows-test-x64-electron
          cache-on-failure: true
          cache-all-crates: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --config.node-linker=hoisted

      - name: Prepare sherpa-onnx runtime
        shell: bash
        run: |
          set -euo pipefail
          node scripts/prepare-sherpa-onnx-runtime.mjs \
            --target "x86_64-pc-windows-msvc"

      - name: Build Electron Windows test package
        shell: bash
        env:
          CARGO_PROFILE_RELEASE_LTO: "off"
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 32
          CARGO_INCREMENTAL: 0
          CARGO_TARGET_DIR: ${{ github.workspace }}/lime-rs/target
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: sccache
        run: |
          set -euxo pipefail
          npm run electron:build
          npx electron-forge make --platform win32 --arch x64 --targets squirrel
          VERSION="$(node -p "require('./package.json').version")"
          node scripts/electron/verify-package-resources.mjs \
            --package-root release-electron \
            --platform win32 \
            --arch x64
          node scripts/electron/stage-release-assets.mjs \
            --forge-dir release-electron \
            --out-dir windows-test-package \
            --target-triple x86_64-pc-windows-msvc \
            --version "$VERSION"

      - name: Download Windows N-1 Squirrel installer
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_N_MINUS_ONE_TAG: ${{ github.event.inputs.n_minus_one_tag }}
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          N_MINUS_ONE_VERSION="$({
            CANDIDATE_VERSION="$VERSION" node --input-type=module <<'NODE'
          import { execFileSync } from "node:child_process";
          import {
            normalizeVersion,
            selectNMinusOneVersion,
          } from "./scripts/electron/windows-squirrel-rc-smoke.mjs";

          const requested = process.env.REQUESTED_N_MINUS_ONE_TAG?.trim();
          if (requested) {
            process.stdout.write(normalizeVersion(requested));
          } else {
            const tags = execFileSync("git", ["tag", "--list"], {
              encoding: "utf8",
            }).split(/\r?\n/);
            process.stdout.write(
              selectNMinusOneVersion({
                candidateVersion: process.env.CANDIDATE_VERSION,
                tags,
              }),
            );
          }
          NODE
          })"
          N_MINUS_ONE_TAG="v$N_MINUS_ONE_VERSION"
          mkdir -p windows-n-minus-one-package
          gh release download "$N_MINUS_ONE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "Lime-$N_MINUS_ONE_VERSION.Setup.exe" \
            --dir windows-n-minus-one-package
          test -f "windows-n-minus-one-package/Lime-$N_MINUS_ONE_VERSION.Setup.exe"
          echo "N_MINUS_ONE_VERSION=$N_MINUS_ONE_VERSION" >> "$GITHUB_ENV"

      - name: Smoke installed Windows Squirrel candidate
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          node scripts/electron/windows-squirrel-rc-smoke.mjs \
            --installer-dir windows-test-package \
            --candidate-feed-dir windows-test-package \
            --evidence-dir ".lime/qc/windows-squirrel-rc/$VERSION" \
            --n-minus-one-installer-dir windows-n-minus-one-package \
            --n-minus-one-version "$N_MINUS_ONE_VERSION" \
            --version "$VERSION"

      - name: Upload Windows Squirrel RC evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: lime-windows-squirrel-rc-evidence
          if-no-files-found: warn
          retention-days: ${{ github.event.inputs.retention_days || 7 }}
          path: .lime/qc/windows-squirrel-rc

      - name: Upload Windows test package
        uses: actions/upload-artifact@v4
        with:
          name: lime-electron-windows-test-x64
          if-no-files-found: error
          retention-days: ${{ github.event.inputs.retention_days || 7 }}
          path: windows-test-package/*
