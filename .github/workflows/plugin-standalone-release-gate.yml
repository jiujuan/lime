name: Plugin Standalone Release Gate

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform for secret preflight"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - macos
          - windows
      package_format:
        description: "macOS package format"
        required: true
        default: "dmg"
        type: choice
        options:
          - app
          - dmg
      channel:
        description: "Release channel"
        required: true
        default: "stable"
        type: choice
        options:
          - stable
          - beta
          - dev
      remote_upload:
        description: "Require remote upload token"
        required: true
        default: true
        type: boolean
      release_evidence_path:
        description: "Optional repo-local final release evidence JSON to validate"
        required: false
        default: ""
        type: string
      artifact_root:
        description: "Optional artifact root for final release file/hash verification"
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: plugin-standalone-release-gate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release_secret_preflight:
    name: Release secret preflight
    runs-on: ubuntu-22.04

    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      LIME_PLUGIN_PREVIOUS_RELEASE_REF: ${{ secrets.LIME_PLUGIN_PREVIOUS_RELEASE_REF || vars.LIME_PLUGIN_PREVIOUS_RELEASE_REF }}
      LIME_PLUGIN_RELEASE_UPLOAD_TOKEN: ${{ secrets.LIME_PLUGIN_RELEASE_UPLOAD_TOKEN }}
      WINDOWS_SIGNING_CERTIFICATE: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE }}
      WINDOWS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run Plugin standalone release secret preflight
        shell: bash
        run: |
          set -euo pipefail
          args=(
            --platform "${{ inputs.platform }}"
            --package-format "${{ inputs.package_format }}"
            --channel "${{ inputs.channel }}"
            --output "$RUNNER_TEMP/plugin-standalone-release-secret-preflight.json"
            --check
          )
          if [ "${{ inputs.remote_upload }}" = "true" ]; then
            args+=(--remote-upload)
          fi
          node scripts/plugin/standalone-release-secret-preflight.mjs "${args[@]}"

      - name: Summarize release gate evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          EVIDENCE="$RUNNER_TEMP/plugin-standalone-release-secret-preflight.json"
          if [ ! -f "$EVIDENCE" ]; then
            echo "Plugin standalone release preflight did not produce evidence." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          node - "$EVIDENCE" <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require("node:fs");
          const evidence = JSON.parse(fs.readFileSync(process.argv[2], "utf8"));
          console.log("## Plugin Standalone Release Gate");
          console.log("");
          console.log(`- status: ${evidence.status}`);
          console.log(`- platform: ${evidence.platform}`);
          console.log(`- package format: ${evidence.packageFormat}`);
          console.log(`- channel: ${evidence.channel}`);
          console.log(`- checked secrets: ${evidence.checkedSecretCount}`);
          console.log(`- missing secrets: ${evidence.missingSecrets.length}`);
          if (evidence.missingSecrets.length > 0) {
            console.log("");
            console.log("Missing secret names:");
            for (const item of evidence.missingSecrets) {
              console.log(`- ${item.key} (${item.category})`);
            }
          }
          NODE

      - name: Run final release evidence check
        if: ${{ inputs.release_evidence_path != '' }}
        shell: bash
        env:
          ARTIFACT_ROOT: ${{ inputs.artifact_root }}
          FINAL_RELEASE_EVIDENCE_PATH: ${{ inputs.release_evidence_path }}
        run: |
          set -euo pipefail
          if [ ! -f "$FINAL_RELEASE_EVIDENCE_PATH" ]; then
            echo "::error::Final release evidence file is missing: $FINAL_RELEASE_EVIDENCE_PATH"
            exit 1
          fi

          args=(
            --evidence "$FINAL_RELEASE_EVIDENCE_PATH"
            --output "$RUNNER_TEMP/plugin-standalone-final-release-audit.json"
            --check
          )
          if [ -n "$ARTIFACT_ROOT" ]; then
            args+=(--artifact-root "$ARTIFACT_ROOT")
          fi

          node scripts/plugin/standalone-release-evidence-check.mjs "${args[@]}"

      - name: Summarize final release evidence audit
        if: ${{ always() && inputs.release_evidence_path != '' }}
        shell: bash
        run: |
          set -euo pipefail
          AUDIT="$RUNNER_TEMP/plugin-standalone-final-release-audit.json"
          if [ ! -f "$AUDIT" ]; then
            echo "Final release evidence checker did not produce an audit." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          node - "$AUDIT" <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require("node:fs");
          const audit = JSON.parse(fs.readFileSync(process.argv[2], "utf8"));
          console.log("");
          console.log("## Plugin Final Release Evidence");
          console.log("");
          console.log(`- status: ${audit.status}`);
          console.log(`- ready to release: ${audit.readyToRelease}`);
          console.log(`- blockers: ${audit.blockers.length}`);
          if (audit.blockers.length > 0) {
            console.log("");
            console.log("Blockers:");
            for (const item of audit.blockers) {
              console.log(`- ${item.code} (${item.source})`);
            }
          }
          NODE

      - name: Upload release gate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-standalone-release-secret-preflight
          path: ${{ runner.temp }}/plugin-standalone-release-secret-preflight.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload final release evidence audit
        if: ${{ always() && inputs.release_evidence_path != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: plugin-standalone-final-release-audit
          path: ${{ runner.temp }}/plugin-standalone-final-release-audit.json
          if-no-files-found: ignore
          retention-days: 14
